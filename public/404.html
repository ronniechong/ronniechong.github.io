<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ronniechong.github.io</title>
    <script>
      // GitHub Pages is a static host with no server-side rewrites, so any
      // path other than / (e.g. /app/about) 404s at the server. This is the
      // standard SPA-on-GitHub-Pages workaround (rafgraph/spa-github-pages):
      // encode the intended path into a query string and redirect to /,
      // where the inline script in index.html decodes it back before React
      // mounts, so react-router sees the real route.
      var pathSegmentsToKeep = 0; // user/org page served at the domain root
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
